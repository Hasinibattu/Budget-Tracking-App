<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Us</title>
    <style>
        /* Background Animation */
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Text Animation */
        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff; }
            50% { text-shadow: 0 0 20px #00ffff, 0 0 30px #00ffff, 0 0 40px #00ffff, 0 0 50px #00ffff; }
        }

        /* Button Hover Animation */
        @keyframes buttonPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Confetti Animation */
        @keyframes confetti {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(45deg, #ff0000, #ff7300, #ffeb00, #47ff00, #00ffee, #2b65ff, #8000ff, #ff0080);
            background-size: 300% 300%;
            animation: gradientBackground 10s infinite ease-in-out;
        }

        .container {
            max-width: 400px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            color: #000;
            animation: textGlow 2s infinite alternate;
        }

        p {
            font-size: 1rem;
            color: #333;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }

        .donate-btn {
            background: linear-gradient(45deg, #ff0080, #ff7300, #ffeb00, #47ff00, #00ffee, #2b65ff, #8000ff);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            animation: buttonPulse 1.5s infinite;
            transition: all 0.3s ease;
        }

        .donate-btn:hover {
            background: linear-gradient(45deg, #8000ff, #2b65ff, #00ffee, #47ff00, #ffeb00, #ff7300, #ff0080);
            box-shadow: 0 0 20px #ff00ff;
        }

        /* Confetti Styles */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: confetti 5s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support Us</h1>
        <p>Your support helps us continue our mission. You can contribute in different ways, such as donations, spreading the word, or volunteering.</p>
        <label>Name:</label>
        <input type="text" id="name" name="name" required><br>
        <label>Email:</label>
        <input type="email" id="email" name="email" required><br>
        <label>Phone Number:</label>
        <input type="tel" id="phone" name="phone" required><br>
        <button class="donate-btn" onclick="donate()">Donate Now</button>
    </div>

    <script>
        // Generate Confetti
        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDelay = Math.random() * 5 + 's';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(confetti);

                // Remove confetti after animation
                confetti.addEventListener('animationend', () => confetti.remove());
            }
        }

        // Donation Button Click
        function donate() {
            alert("Thank you for your support! Redirecting to the donation page...");
            createConfetti();
            setTimeout(() => {
                window.location.href = "payment method 5.html";
            }, 3000);
        }

        // Trigger Confetti on Page Load
        window.onload = createConfetti;
    </script>
</body>
</html>
